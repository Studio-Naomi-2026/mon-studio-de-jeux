<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        #world { width: 100vw; height: 100vh; position: relative; transition: background 0.5s; }
        
        /* NAOMI */
        #naomi { 
            position: absolute; width: 60px; height: 60px; font-size: 50px; 
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease-out; transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* DÉCORS ET ÉLÉMENTS */
        .room-label { position: absolute; top: 20px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.5); padding: 5px 0; }
        .npc { position: absolute; font-size: 40px; z-index: 5; }
        .dialog-box { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: #2c3e50; border: 4px solid #ecf0f1; color: white;
            padding: 15px; border-radius: 10px; display: none; z-index: 20;
        }
    </style>
</head>
<body>

<div id="world">
    <div class="room-label" id="room-name">DORTOIR DE NAOMI</div>
    <div id="naomi">👩‍🚀</div>
    <div id="npc-robot" class="npc" style="top: 200px; left: 100px; display:none;">🤖</div>
    <div id="dialog" class="dialog-box"></div>
</div>

<script>
    const world = document.getElementById('world');
    const naomi = document.getElementById('naomi');
    const roomName = document.getElementById('room-name');
    const npcRobot = document.getElementById('npc-robot');
    const dialog = document.getElementById('dialog');

    let currentRoom = "dortoir";
    let posX = window.innerWidth / 2;
    let posY = window.innerHeight / 2;

    // COULEURS DES PIÈCES
    const rooms = {
        dortoir: { name: "DORTOIR", bg: "#2c3e50", npc: false },
        salon: { name: "SALON COMMUN", bg: "#1a5276", npc: true },
        cockpit: { name: "COCKPIT DE PILOTAGE", bg: "#1b2631", npc: false }
    };

    function updateView() {
        world.style.backgroundColor = rooms[currentRoom].bg;
        roomName.innerText = rooms[currentRoom].name;
        npcRobot.style.display = rooms[currentRoom].npc ? "block" : "none";
        naomi.style.left = posX + "px";
        naomi.style.top = posY + "px";
    }

    // DÉPLACEMENT LIBRE (STARDEW STYLE)
    window.addEventListener('pointerdown', (e) => {
        posX = e.clientX;
        posY = e.clientY;
        
        // CHANGER DE PIÈCE SI ON TOUCHE LES BORDS
        if (posX > window.innerWidth - 30) {
            if (currentRoom === "dortoir") currentRoom = "salon";
            else if (currentRoom === "salon") currentRoom = "cockpit";
            posX = 50;
        } else if (posX < 30) {
            if (currentRoom === "cockpit") currentRoom = "salon";
            else if (currentRoom === "salon") currentRoom = "dortoir";
            posX = window.innerWidth - 50;
        }

        updateView();
        checkNPC();
    });

    function checkNPC() {
        if (currentRoom === "salon" && Math.abs(posX - 100) < 50 && Math.abs(posY - 200) < 50) {
            showDialog("B0T-4 : Bonjour Naomi ! Prête pour le décollage ? Le code est GALAXY-N.");
        } else {
            dialog.style.display = "none";
        }
    }

    function showDialog(text) {
        dialog.innerText = text;
        dialog.style.display = "block";
    }

    updateView();
</script>
</body>
</html>
