<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; color: white; }
        #game-world { width: 100vw; height: 100vh; position: relative; transition: 1s ease-in-out; background-size: cover; background-position: center; }
        
        /* NAOMI & ENTITÉS */
        #naomi { position: absolute; width: 50px; height: 50px; font-size: 45px; z-index: 100; transition: 0.3s linear; transform: translate(-50%, -50%); filter: drop-shadow(0 0 10px #00f2ff); }
        .entity { position: absolute; font-size: 35px; z-index: 10; transition: 0.5s; cursor: pointer; transform: translate(-50%, -50%); }
        
        /* INTERFACE */
        #hud { position: fixed; top: 10px; left: 10px; z-index: 200; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid #00f2ff; }
        #inventory { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 20px; border: 2px solid #555; z-index: 200; }
        .slot { width: 40px; height: 40px; border: 1px solid #444; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #dialog-box { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 85%; background: #1a1a2e; border: 3px solid #00f2ff; padding: 15px; border-radius: 10px; display: none; z-index: 300; }
    </style>
</head>
<body>

<div id="game-world">
    <div id="hud">📍 <span id="loc-name">Station Alpha</span> | 🔋 Énergie: <span id="energy">100</span></div>
    <div id="naomi">👩‍🚀</div>
    <div id="entities-container"></div>
    <div id="dialog-box"></div>
    <div id="inventory">
        <div class="slot" id="s1"></div><div class="slot" id="s2"></div><div class="slot" id="s3"></div>
    </div>
</div>

<script>
    const world = document.getElementById('game-world');
    const naomi = document.getElementById('naomi');
    const entContainer = document.getElementById('entities-container');
    const dialog = document.getElementById('dialog-box');
    
    let currentPlanet = 0;
    const planets = [
        { name: "Station Alpha", bg: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072", 
          entities: [{id: 1, type: "🤖", name: "B0T-4", msg: "Bonjour Naomi ! On manque de cristaux ici."}, {id: 2, type: "💎", name: "Cristal"}] },
        { name: "Planète Rouge", bg: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=2000", 
          entities: [{id: 3, type: "👽", name: "Zog", msg: "Bienvenue sur Mars ! As-tu faim ?"}, {id: 4, type: "🐶", name: "Cyber-Chien"}] },
        { name: "Nébuleuse Bleue", bg: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2022", 
          entities: [{id: 5, type: "👩‍🔬", name: "Dr Elle", msg: "L'air est pur ici, n'est-ce pas ?"}] }
    ];

    function loadPlanet(index) {
        const p = planets[index];
        world.style.backgroundImage = `url('${p.bg}')`;
        document.getElementById('loc-name').innerText = p.name;
        entContainer.innerHTML = '';
        p.entities.forEach(e => {
            const div = document.createElement('div');
            div.className = 'entity';
            div.innerHTML = e.type;
            div.style.left = Math.random() * 80 + 10 + "%";
            div.style.top = Math.random() * 60 + 20 + "%";
            div.onclick = () => speak(e.name, e.msg || "Un objet mystérieux...");
            entContainer.appendChild(div);
        });
    }

    window.addEventListener('pointerdown', (e) => {
        naomi.style.left = e.clientX + "px";
        naomi.style.top = e.clientY + "px";
        
        // Changer de planète si on touche le bord droit
        if (e.clientX > window.innerWidth - 50) {
            currentPlanet = (currentPlanet + 1) % planets.length;
            loadPlanet(currentPlanet);
            naomi.style.left = "60px";
        }
    });

    function speak(who, what) {
        dialog.style.display = "block";
        dialog.innerHTML = `<strong>${who}:</strong><br>${what}`;
        setTimeout(() => { dialog.style.display = "none"; }, 4000);
    }

    loadPlanet(0);
</script>
</body>
</html>
