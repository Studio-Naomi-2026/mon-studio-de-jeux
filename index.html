<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; color: white; }
        #game-world { width: 100vw; height: 100vh; position: relative; transition: 0.5s; background-size: cover; }
        
        #naomi { position: absolute; width: 50px; height: 50px; font-size: 45px; z-index: 100; transition: 0.4s ease-out; transform: translate(-50%, -50%); }
        
        /* PERSONNAGES VIVANTS */
        .entity { position: absolute; font-size: 35px; z-index: 10; transform: translate(-50%, -50%); transition: 1s ease-in-out; }
        .living { animation: breath 2s infinite alternate; }
        @keyframes breath { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }

        /* INVENTAIRE */
        #inventory { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; border: 2px solid #00f2ff; z-index: 200; }
        .slot { width: 45px; height: 45px; border: 1px solid #444; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 25px; }
        
        #dialog { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(26, 26, 46, 0.9); border: 2px solid #00f2ff; padding: 10px; border-radius: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="game-world">
    <div id="naomi">👩‍🚀</div>
    <div id="entities"></div>
    <div id="dialog"></div>
    <div id="inventory">
        <div class="slot" id="slot-0"></div>
        <div class="slot" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
    </div>
</div>

<script>
    const world = document.getElementById('game-world');
    const naomi = document.getElementById('naomi');
    const entContainer = document.getElementById('entities');
    const dialog = document.getElementById('dialog');
    const slots = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')];

    let inv = [];
    let currentX = window.innerWidth/2, currentY = window.innerHeight/2;
    let entities = [
        { id: 1, x: 100, y: 200, type: "🤖", name: "B0T-4", msg: "Trouve les 💎 cachés !", living: true },
        { id: 2, x: 250, y: 400, type: "💎", name: "Cristal", item: true }
    ];

    function draw() {
        entContainer.innerHTML = '';
        entities.forEach(e => {
            const d = document.createElement('div');
            d.className = 'entity' + (e.living ? ' living' : '');
            d.innerHTML = e.type;
            d.style.left = e.x + "px";
            d.style.top = e.y + "px";
            entContainer.appendChild(d);
        });
    }

    window.addEventListener('pointerdown', (e) => {
        currentX = e.clientX; currentY = e.clientY;
        naomi.style.left = currentX + "px";
        naomi.style.top = currentY + "px";
        
        setTimeout(checkCollisions, 400);
    });

    function checkCollisions() {
        entities.forEach((e, index) => {
            let dist = Math.hypot(currentX - e.x, currentY - e.y);
            
            if (dist < 50) {
                if (e.item) {
                    // RAMASSER
                    if (inv.length < 3) {
                        inv.push(e.type);
                        slots[inv.length-1].innerHTML = e.type;
                        entities.splice(index, 1); // Disparaît du monde
                        draw();
                    }
                } else if (e.msg) {
                    // PARLER
                    dialog.innerHTML = `<strong>${e.name}</strong>: ${e.msg}`;
                    dialog.style.display = 'block';
                    setTimeout(() => dialog.style.display = 'none', 3000);
                }
            }
        });
    }

    // SIMULER LA VIE (Le robot bouge un peu tout seul)
    setInterval(() => {
        entities.forEach(e => {
            if (e.living) {
                e.x += (Math.random() - 0.5) * 20;
                e.y += (Math.random() - 0.5) * 20;
            }
        });
        draw();
    }, 2000);

    draw();
</script>
</body>
</html>
