<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio-Naomi-2026 | Protection FR</title>
    <style>
        /* DESIGN DU STUDIO */
        body { 
            background: #0d1117; color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
        }
        header { 
            background: #161b22; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #30363d;
        }
        .logo { font-weight: bold; color: #f0f6fc; letter-spacing: 1px; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        .editor-box { width: 50%; display: flex; flex-direction: column; padding: 10px; background: #0d1117; }
        .label { font-size: 12px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        textarea { 
            flex: 1; background: #010409; color: #79c0ff; border: 1px solid #30363d;
            padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px;
            border-radius: 6px; resize: none; outline: none; line-height: 1.5;
        }

        .preview-box { width: 50%; background: #ffffff; border-left: 2px solid #30363d; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .controls { background: #161b22; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        button { 
            background: #238636; color: white; border: none; padding: 12px 15px; 
            border-radius: 6px; font-weight: 600; cursor: pointer; flex: 1;
        }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            .editor-box, .preview-box { width: 100%; height: 50%; }
        }
    </style>
</head>
<body class="notranslate">

<header>
    <div class="logo">🕹️ STUDIO NAOMI V1</div>
    <div style="font-size: 10px; color: #3fb950;">● PROTECTION FR ACTIVE</div>
</header>

<div id="main-container">
    <div class="editor-box">
        <div class="label">Écris ton code ici :</div>
        <textarea id="code-input" spellcheck="false"></textarea>
    </div>
    
    <div class="preview-box">
        <iframe id="output-window" class="notranslate"></iframe>
    </div>
</div>

<div class="controls">
    <button onclick="updateRender()">⚡ LANCER LE JEU</button>
</div>

<script>
    const input = document.getElementById('code-input');
    const output = document.getElementById('output-window');

    const initialCode = `<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head><meta name="google" content="notranslate"></head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
    <h1>Bravo Naomi !</h1>
    <p>Ce texte restera en français.</p>
    <button onclick="alert('BIP ! Son activé')" style="padding:15px; background:blue; color:white; border:none; border-radius:10px;">TESTER LE SON</button>
</body>
</html>`;

    function updateRender() {
        const frame = output.contentDocument || output.contentWindow.document;
        frame.open();
        frame.write(input.value);
        frame.close();
    }

    input.addEventListener('input', updateRender);
    input.value = initialCode;
    updateRender();
</script>

</body>
</html>
