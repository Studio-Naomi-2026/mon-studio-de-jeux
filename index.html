<!DOCTYPE html>
<html lang="fr" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* SCÈNE 1 : LE COULOIR DE LA STATION */
        #station-hall {
            position: relative; width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?auto=format&fit=crop&w=1500') center/cover;
            display: flex; flex-direction: column; align-items: center;
        }

        #naomi-character {
            position: absolute; bottom: 100px; left: 50%;
            font-size: 80px; transition: 0.1s; transform: translateX(-50%);
            filter: drop-shadow(0 0 10px #00f2ff);
        }

        #cockpit-door {
            position: absolute; top: 10%; width: 120px; height: 120px;
            background: rgba(0, 242, 255, 0.2); border: 3px dashed #00f2ff;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }

        /* SCÈNE 2 : LE VAISSEAU */
        #space-view { display: none; width: 100vw; height: 100vh; background: #000; }

        .ui-msg { background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00f2ff; border-radius: 10px; margin-top: 20px; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; }
        .btn-move { width: 80px; height: 80px; background: rgba(0,242,255,0.3); border: 2px solid #00f2ff; color: white; border-radius: 50%; font-size: 30px; }
    </style>
</head>
<body class="notranslate">

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
</audio>

<div id="station-hall">
    <div class="ui-msg" id="mission-text">MISSION : Rejoins le cockpit en haut !</div>
    
    <div id="cockpit-door">🛸 COCKPIT</div>
    
    <div id="naomi-character">👩‍🚀</div>

    <div class="controls">
        <button class="btn-move" onclick="movePerson(-20, 0)">◀️</button>
        <button class="btn-move" onclick="movePerson(0, -20)">🔼</button>
        <button class="btn-move" onclick="movePerson(20, 0)">▶️</button>
    </div>
</div>

<canvas id="space-view"></canvas>

<script>
    let personX = window.innerWidth / 2;
    let personY = window.innerHeight - 150;
    const character = document.getElementById('naomi-character');
    const music = document.getElementById('bgMusic');

    function movePerson(dx, dy) {
        if(music.paused) music.play(); // Lance la musique au premier pas
        
        personX += dx;
        personY += dy;
        character.style.left = personX + "px";
        character.style.top = personY + "px";

        // Vérifier si elle arrive à la porte du cockpit
        if (personY < 150) {
            checkCode();
        }
    }

    function checkCode() {
        let code = prompt("ENTREZ LE CODE D'ACCÈS DU VAISSEAU :");
        // NOUVEAU CODE : GALAXY-N
        if (code && code.toUpperCase() === "GALAXY-N") {
            startFlight();
        } else {
            alert("CODE INCORRECT. Retour au point de départ !");
            personY = window.innerHeight - 150;
            character.style.top = personY + "px";
        }
    }

    function startFlight() {
        document.getElementById('station-hall').style.display = 'none';
        const canvas = document.getElementById('space-view');
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        alert("🚀 DÉCOLLAGE IMMÉDIAT !");
        
        // Ici on remplace le personnage par le vaisseau
        function flight() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "60px serif";
            ctx.fillText("🚀", personX - 30, personY); 
            // Le vaisseau suit maintenant ton dernier mouvement !
            requestAnimationFrame(flight);
        }
        flight();
    }
</script>
</body>
</html>
